<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Nata's Homepage</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&display=block"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="css/style.css"
    />

    <!-- ⚡ Optimasi Kecepatan: Preload CDN & Lottie File ⚡ -->
    <link
      rel="preconnect"
      href="https://lottie.host"
      crossorigin
    />
    <link
      rel="preconnect"
      href="https://unpkg.com"
      crossorigin
    />
    <link
      rel="preload"
      href="https://lottie.host/24ef1321-2449-41e1-b5e4-ae6d8569daa3/rRzRQUOEcE.lottie"
      as="fetch"
      crossorigin
    />

    <script
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js"
      type="module"
    ></script>
  </head>
  <body>
    <div id="splash">
      <div class="splash-content">
        <dotlottie-wc
          src="https://lottie.host/24ef1321-2449-41e1-b5e4-ae6d8569daa3/rRzRQUOEcE.lottie"
          style="
            width: 500px;
            height: 500px;
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
          "
          autoplay
          loop
        ></dotlottie-wc>
        <div id="splash-text">
          Good<span id="word-mask"><span id="word-cycle">Morning</span></span
          ><span id="name-part">Nata!</span>
        </div>
      </div>
    </div>

    <div id="homepage">
      <div class="main-wrapper">
        <div class="clock-block">
          <div id="clock"></div>
          <div id="date"></div>
        </div>

        <div class="search-wrapper">
          <div class="search-container">
            <svg
              class="search-icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle
                cx="11"
                cy="11"
                r="8"
              ></circle>
              <line
                x1="21"
                y1="21"
                x2="16.65"
                y2="16.65"
              ></line>
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search anything..."
              autocomplete="off"
              spellcheck="false"
            />
            <svg
              class="search-ring"
              viewBox="0 0 640 56"
              xmlns="http://www.w3.org/2000/svg"
              preserveAspectRatio="none"
            >
              <rect
                class="ring-path"
                x="2"
                y="2"
                width="636"
                height="52"
                rx="27"
                ry="27"
              />
            </svg>
          </div>
        </div>
      </div>

      <button
        id="dock-toggle"
        aria-label="Toggle Dock"
      >
        <svg
          id="dock-icon"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </button>
      <div id="bookmarks-grid"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="js/clock.js"></script>
    <script src="js/bookmarks.js"></script>
    <script src="js/animations.js"></script>
  </body>
</html>
